name: Compila e distribuisci applicazione .NET Core nell'app per le funzioni ebaymarketplace

on:
  push:
    branches:
    - master

permissions:
  id-token: write
  contents: read

env:
  AZURE_FUNCTIONAPP_NAME: ebaymarketplace
  CONFIGURATION: Release
  DOTNET_CORE_VERSION: 8.0.x
  WORKING_DIRECTORY: "eBay Marketplace"
  PUBLISH_OUTPUT: published   # cartella semplice senza spazi, senza path annidati

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_CORE_VERSION }}

    - name: Restore
      run: dotnet restore "${{ env.WORKING_DIRECTORY }}"

    - name: Build
      run: dotnet build "${{ env.WORKING_DIRECTORY }}" --configuration ${{ env.CONFIGURATION }} --no-restore

    - name: Publish
      run: dotnet publish "${{ env.WORKING_DIRECTORY }}" --configuration ${{ env.CONFIGURATION }} --no-build --output "${{ env.PUBLISH_OUTPUT }}"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: functionapp
        path: ${{ env.PUBLISH_OUTPUT }}   # upload del contenuto della cartella published/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: functionapp
        path: ${{ env.PUBLISH_OUTPUT }}   # stessa variabile, stesso nome senza spazi

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ vars.ebaymarketplace_CLIENT_ID_72B9 }}
        tenant-id: ${{ vars.ebaymarketplace_TENANT_ID_72B9 }}
        subscription-id: ${{ vars.ebaymarketplace_SUBSCRIPTION_ID_72B9 }}

    - name: Deploy to Azure Function App
      uses: Azure/functions-action@v1
      with:
        app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
        package: ${{ env.PUBLISH_OUTPUT }}
        scm-do-build-during-deployment: false
        remote-build: false
